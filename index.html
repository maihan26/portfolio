<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mai Han Nguyen | Data Portfolio</title>
  <meta name="description" content="One-page data portfolio website." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/normalize.css" />
  <link rel="stylesheet" href="css/featherlight.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .portfolio-card-title {
      margin-top: 16px;
      font-size: 18px;
      color: #444;
    }
    .portfolio-card-title a {
      color: inherit;
    }
    .portfolio-card-text {
      width: 85%;
      margin: 10px auto 0;
      color: #777;
    }
    .portfolio-card-actions {
      width: 85%;
      margin: 18px auto 0;
    }
    .portfolio-card-actions a {
      width: auto;
      min-width: 150px;
      padding: 14px 22px;
      font-size: 15px;
    }
    .footer-note {
      color: #777;
    }
    .about-actions {
      margin-top: 30px;
    }
    .about-actions a {
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 12px;
    }
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>
  <header id="top">
    <h1 class="logo"><a href="index.html#banner">Mai Han Nguyen</a></h1>
    <nav>
      <ul id="nav-list"></ul>
    </nav>
    <div class="clear"></div>
  </header>

  <section id="banner">
    <div class="wrapper">
      <h2 id="hero-title"></h2>
      <p class="subtitle" id="hero-subtitle"></p>
      <div class="buttons" id="hero-buttons"></div>
    </div>
  </section>

  <main>
    <section class="text-section" id="about">
      <div class="wrapper">
        <div class="image align-left">
          <img id="about-image" src="images/project-1.jpg" alt="About image" />
        </div>
        <div class="text align-left" id="about-content"></div>
        <div class="clear"></div>
      </div>
    </section>

    <section class="services-section" id="services">
      <div class="wrapper">
        <p class="subtitle" id="services-subtitle"></p>
        <h3 id="services-title"></h3>
        <ul class="services-list" id="services-list"></ul>
        <div class="clear"></div>
      </div>
    </section>

    <section class="portfolio-section" id="portfolio">
      <div class="wrapper">
        <p class="subtitle" id="portfolio-subtitle"></p>
        <h3 id="portfolio-title"></h3>
        <ul class="portfolio-list" id="portfolio-list"></ul>
        <div class="clear"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrapper">
      <a class="logo" href="index.html#banner">Mai Han Nguyen</a>
      <div class="footer-left">
        <p class="copyright" id="footer-name"></p>
        <p class="footer-note" id="footer-tagline"></p>
      </div>
      <div class="footer-right" id="footer-links"></div>
      <div class="clear"></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
