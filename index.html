<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Han Nguyen | Geospatial Data for Good</title>
  <meta name="description" content="Geospatial data portfolio of Han Nguyen" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/normalize.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Shared sticky header -->
  <header id="top">
    <div class="wrapper header-inner">
      <h1 class="logo">
        <a href="#banner" aria-label="Go to home section">
          <img src="images/home_flaticon.png" alt="Home" class="home-icon" />
        </a>
      </h1>

      <nav aria-label="Primary navigation">
        <ul id="nav-list"></ul>
      </nav>
    </div>
  </header>

  <!-- Hero: text is injected from data.js -->
  <section id="banner">
    <div class="wrapper banner-content">
      <div class="hero-copy">
        <h2 id="hero-title"></h2>
        <p class="subtitle" id="hero-subtitle"></p>
        <div class="buttons" id="hero-buttons"></div>
      </div>
    </div>
  </section>

  <main>
    <!-- About section -->
    <section class="text-section" id="about">
      <div class="wrapper about-grid">
        <div class="image-panel">
          <img id="about-image" alt="About image" />
        </div>
        <div class="text-panel" id="about-content"></div>
      </div>
    </section>

    <!-- Portfolio section -->
    <section class="portfolio-section" id="portfolio">
      <div class="wrapper portfolio-shell">
        <p class="subtitle" id="portfolio-subtitle"></p>
        <h3 id="portfolio-title"></h3>
        <div class="filter-row" id="portfolio-filters"></div>
        <ul class="portfolio-list" id="portfolio-list"></ul>
      </div>
    </section>
  </main>
<!-- Call to action - Contact info -->
  <section class="cta-section">
  <div class="wrapper">
    <h3>Let’s connect</h3>
    <p>Thank you for visiting my site. I'd like to hear from you.</p>

    <div class="cta-buttons">
      <a href="mailto:maihan26@email.com" class="button-1">Email me</a>
      <a href="https://www.linkedin.com/in/maihannguyen/" target="_blank" class="button-2">LinkedIn</a>
    </div>
  </div>
</section>

  <!-- Shared footer -->
  <footer>
    <div class="wrapper footer-inner">
      <div class="footer-left">
        <a class="footer-home" href="#banner" aria-label="Back to top">
          <img src="images/home_lightgrey.png" alt="Home" class="home-icon footer-icon" />
        </a>
        <p class="footer-note" id="footer-tagline"></p>
      </div>
      <div class="footer-right" id="footer-links"></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
